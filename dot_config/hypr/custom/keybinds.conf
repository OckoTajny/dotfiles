# Ctrl+Alt+N → movetoworkspace (cz-layout keycode workaround)
bind = Ctrl+Alt, code:10, movetoworkspace, 1
bind = Ctrl+Alt, code:11, movetoworkspace, 2
bind = Ctrl+Alt, code:12, movetoworkspace, 3
bind = Ctrl+Alt, code:13, movetoworkspace, 4
bind = Ctrl+Alt, code:14, movetoworkspace, 5
bind = Ctrl+Alt, code:15, movetoworkspace, 6
bind = Ctrl+Alt, code:16, movetoworkspace, 7
bind = Ctrl+Alt, code:17, movetoworkspace, 8
bind = Ctrl+Alt, code:18, movetoworkspace, 9
bind = Ctrl+Alt, code:19, movetoworkspace, 10

# whisper-flow: toggle voice dictation (press to record, press again to transcribe+type)
bind = Super, Y, exec, ~/.local/bin/whisper-flow

# keyboard layout toggle (us <-> cz) with notification
bind = Super, Space, exec, ~/.local/bin/kb-toggle
