# bind = Ctrl+Shift, Escape, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "gnome-system-monitor" "plasma-systemmonitor --page-name Processes" "command -v btop && kitty -1 fish -c btop" # Task manager

unbind = Super, C
unbind = Super, O
bind = Super, C, exec, kitty -e nvim # LazyVim
bind = Super, O, exec, flatpak run org.onlyoffice.desktopeditors # OnlyOffice
bind = Super, I, exec, ~/.local/share/JetBrains/Toolbox/scripts/idea # IntelliJ IDEA

# Kept from illogical-impulse (Ambxst swap)
bind = Super, W, exec, brave # Browser
bind = Super, E, exec, nautilus # File manager
bind = Super, B, exec, kitty -e btop # btop
bind = Super, Return, exec, kitty -e brrtfetch -width 50 -height 50 -info "fastfetch --logo-type none --color-keys magenta --color-title magenta" /home/ocko/brrtfetch/gifs/distro/linux/arch-purple-glitch-transparent.gif # Terminal + brrtfetch
# Super, T handled in hyprland.conf OVERRIDES section (must override ambxst's tmux bind)
bind = Ctrl+Alt, T, exec, kitty # Terminal (Ubuntu muscle memory)
bind = Super, F, fullscreen, 1 # Maximize (keep gaps + bar)
bind = Super+Shift, F, fullscreen, 0 # Fullscreen (true)
bind = Super, Q, killactive, # Close window
bind = Alt, F4, killactive, # Close window (Windows muscle memory)
bind = Shift+Super, code:201, exec, discord # Copilot key -> Discord
bind = Ctrl+Shift+Super, code:201, exec, spotify # Ctrl+Copilot -> Spotify
bind = Ctrl+Super, P, exec, ~/.local/bin/dotswap use win11 && ~/.local/bin/dotswap-postapply win11 # Swap to win11 (waffle) profile
bind = Ctrl+Shift+Super, Right, exec, ~/.local/bin/dotswap-cycle next # Cycle dotswap profile forward
bind = Ctrl+Shift+Super, Left, exec, ~/.local/bin/dotswap-cycle prev # Cycle dotswap profile backward

# Screenshots (Print key, kept from illogical-impulse)
bindl = ,Print, exec, ambxst run screenshot # Region screenshot (Ambxst UI)
bindl = Ctrl,Print, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png # Fullscreen screenshot >> file
bindl = Shift,Print, exec, grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" - | wl-copy # Fullscreen screenshot >> clipboard

